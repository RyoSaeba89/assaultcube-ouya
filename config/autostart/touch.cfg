// this file is distributed for mobile devices to set meaningful default values

// OUYA: use the PC-style native masterserver (HTTP, port 80 -> works on API16, unlike the Java HTTPS
// serverlist fetch which always SSL-fails). Forced every launch so it overrides any persisted saved.cfg.
// The classic Multiplayer > Join a server menu calls updatefrommaster, which now fetches the live list.
mastertype 1

// OUYA: the mobile default menuzoom (0.4) zooms menus in so far that the top of long menus (the server
// browser in particular) is pushed off the top of the screen. Lower it so the whole list is visible.
menuzoom 0.1
