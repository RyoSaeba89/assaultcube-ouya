// AssaultCube OUYA / Tegra 3 performance defaults.
// Exec'd at boot on Android (main.cpp), after autoexec, while still INIT_LOAD.
// The ULP GeForce is fillrate / memory-bandwidth bound, so this disables the
// heaviest extra-render passes and trims texture bandwidth. Lower = faster.
// (Render resolution itself is downscaled separately in SDLActivity.sRenderMaxHeight.)

// --- heaviest passes: full extra-scene renders / stencil fill ---
waterreflect 0       // skip re-rendering the scene into the water reflection texture
waterrefract 0
stencilshadow 0      // no stencil shadow volumes (extra geometry + stencil fill)
dynshadow 0          // no blob / dynamic shadows
dynlight 0           // no dynamic relighting of surfaces

// --- geometry / overdraw ---
watersubdiv 16       // coarser water mesh => far fewer triangles
fog 384              // shorter view distance => less geometry drawn + less overdraw
particlesize 60      // smaller particles => less smoke/explosion overdraw

// --- texture bandwidth (INIT_LOAD: applied at boot) ---
texreduce 1          // half-resolution textures (big bandwidth win on Tegra)
maxtexsize 1024      // cap texture size
trilinear 0          // bilinear filtering only (cheaper than trilinear)

// --- frame pacing ---
maxfps 60            // cap to refresh: steadier pacing, less thermal throttling
